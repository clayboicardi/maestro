name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Supersede in-flight runs on the same ref (a fresh push to a PR/branch cancels
# its own prior run). The ref in the key keeps master and each PR independent,
# so they never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo (checkout); nothing writes.
permissions:
  contents: read

jobs:
  lint-and-type:
    name: Lint + type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Pinned for reproducibility (matches local dev). Dependabot bumps the
          # action SHA but NOT this input -- re-pin manually on a uv upgrade.
          version: "0.10.6"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Basedpyright
        run: uv run basedpyright

  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Pinned for reproducibility (matches local dev). Dependabot bumps the
          # action SHA but NOT this input -- re-pin manually on a uv upgrade.
          version: "0.10.6"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --python ${{ matrix.python }}
      # Coverage gate runs on ONE matrix entry (3.12) -- coverage is
      # version-invariant here, so --cov on all three would triple the work for
      # identical numbers. pyproject [tool.coverage.report] fail_under=75
      # enforces the floor (current coverage ~93%).
      - name: Pytest + coverage gate (3.12)
        if: matrix.python == '3.12'
        run: >
          uv run pytest tests/unit tests/schema_fidelity tests/integration
          --cov=src/maestro --cov-report=term-missing --cov-fail-under=75 -v
      - name: Pytest
        if: matrix.python != '3.12'
        # Same suite, no coverage. The schema_fidelity drift test makes a live
        # GitHub fetch but is network-tolerant (skips on outage); the `smoke`
        # marker (live upstream) is excluded via pyproject addopts and runs in
        # smoke.yaml.
        run: uv run pytest tests/unit tests/schema_fidelity tests/integration -v
